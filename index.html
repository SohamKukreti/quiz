<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contextualizing Gender — Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --cream:#F6F0E8;
  --cream-dark:#EDE4D6;
  --cream-mid:#F0E8DC;
  --surface:#FFFFFF;
  --surface-warm:#FDFAF6;
  --border:#DDD4C4;
  --border-light:#EAE2D4;
  --text:#1A1410;
  --text-mid:#4A4038;
  --muted:#8A7E72;
  --muted-light:#ADA49A;
  --accent:#C96B4A;
  --accent-hover:#B55A3A;
  --accent-light:#F5E8E0;
  --accent-pale:#FBF3EE;
  --ok:#2A6B4A;
  --ok-bg:#EAF4EE;
  --ok-border:#B6D9C5;
  --ok-light:#F0F9F4;
  --no:#B83832;
  --no-bg:#FBF0EF;
  --no-border:#F0BFBC;
  --r:14px;
  --r-sm:10px;
  --shadow-sm:0 1px 3px rgba(60,40,20,.06),0 2px 8px rgba(60,40,20,.04);
  --shadow-md:0 4px 16px rgba(60,40,20,.08),0 1px 3px rgba(60,40,20,.06);
  --shadow-lg:0 8px 32px rgba(60,40,20,.1),0 2px 8px rgba(60,40,20,.06);
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── BASE ── */
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:3rem 1.25rem 5rem;
  /* Subtle grain texture */
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
}

.wrap{width:100%;max-width:660px}

/* ── PAGE ENTRY ANIMATION ── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}
.wrap > *{animation:fadeUp .5s ease both}

/* ── HEADER ── */
.logo{text-align:center;margin-bottom:2.5rem;padding:0 1rem}
.logo-eyebrow{
  font-family:'DM Sans',sans-serif;
  font-size:.7rem;
  font-weight:600;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:.6rem;
  display:block;
}
.logo h1{
  font-family:'Cormorant Garamond',serif;
  font-size:2.4rem;
  font-weight:600;
  color:var(--text);
  letter-spacing:-0.01em;
  line-height:1.1;
}
.logo-sub{
  color:var(--muted);
  font-size:.82rem;
  font-weight:400;
  margin-top:.55rem;
  letter-spacing:.02em;
}
.logo-sub span{
  display:inline-block;
  width:3px;height:3px;
  border-radius:50%;
  background:var(--muted-light);
  vertical-align:middle;
  margin:0 .5rem;
  position:relative;top:-1px;
}

/* ── DIVIDER ── */
.logo-rule{
  width:40px;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  margin:.9rem auto 0;
  border-radius:1px;
}

/* ── CARD ── */
.card{
  background:var(--surface);
  border-radius:var(--r);
  border:1px solid var(--border-light);
  box-shadow:var(--shadow-sm);
  padding:1.6rem 1.75rem;
  margin-bottom:1rem;
  transition:box-shadow .2s ease;
}
.card:hover{box-shadow:var(--shadow-md)}

/* ── SECTION LABEL ── */
.section-label{
  font-size:.65rem;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.14em;
  color:var(--muted);
  margin-bottom:1rem;
}

/* ── SELECT ALL ROW ── */
.select-all-row{
  display:flex;align-items:center;gap:.7rem;
  padding-bottom:.9rem;
  margin-bottom:.9rem;
  border-bottom:1px solid var(--border-light);
}
.select-all-row label{
  font-weight:500;
  font-size:.88rem;
  cursor:pointer;
  user-select:none;
  color:var(--text-mid);
}

/* ── CUSTOM CHECKBOX ── */
input[type=checkbox]{
  appearance:none;
  -webkit-appearance:none;
  width:16px;height:16px;
  border:1.5px solid var(--border);
  border-radius:4px;
  background:#fff;
  cursor:pointer;
  flex-shrink:0;
  position:relative;
  transition:all .15s;
}
input[type=checkbox]:checked{
  background:var(--accent);
  border-color:var(--accent);
}
input[type=checkbox]:checked::after{
  content:'';
  position:absolute;
  left:4px;top:1.5px;
  width:5px;height:9px;
  border:1.5px solid #fff;
  border-top:none;border-left:none;
  transform:rotate(40deg);
}
input[type=checkbox]:indeterminate{
  background:var(--accent-light);
  border-color:var(--accent);
}
input[type=checkbox]:indeterminate::after{
  content:'';
  position:absolute;
  left:2.5px;top:6px;
  width:9px;height:1.5px;
  background:var(--accent);
  border-radius:1px;
}
input[type=checkbox]:hover:not(:checked){border-color:var(--accent)}

/* ── WEEKS GRID ── */
.weeks-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:.5rem;
}
.week-item{
  display:flex;align-items:center;gap:.45rem;
  padding:.55rem .7rem;
  border:1.5px solid var(--border-light);
  border-radius:var(--r-sm);
  cursor:pointer;
  font-size:.8rem;
  font-weight:500;
  color:var(--text-mid);
  transition:all .15s;
  user-select:none;
  background:var(--surface-warm);
}
.week-item:has(input:checked){
  border-color:var(--accent);
  background:var(--accent-pale);
  color:var(--accent);
}
.week-item:hover:not(:has(input:checked)){
  border-color:var(--border);
  background:#fff;
}
.week-item input{margin:0}

/* ── OPTIONS ROW ── */
.options-row{display:flex;align-items:center;justify-content:space-between;gap:1rem}
.opt-label{font-size:.9rem;font-weight:500;color:var(--text-mid)}
.opt-sub{font-size:.76rem;color:var(--muted);margin-top:.2rem}

/* ── TOGGLE ── */
.toggle{position:relative;width:42px;height:23px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.tslider{
  position:absolute;inset:0;
  background:var(--border);
  border-radius:12px;
  cursor:pointer;
  transition:.22s ease;
}
.tslider::before{
  content:'';
  position:absolute;
  width:17px;height:17px;
  left:3px;top:3px;
  background:#fff;
  border-radius:50%;
  transition:.22s ease;
  box-shadow:0 1px 4px rgba(0,0,0,.15);
}
.toggle input:checked+.tslider{background:var(--accent)}
.toggle input:checked+.tslider::before{transform:translateX(19px)}

/* ── BUTTONS ── */
.btn{
  display:block;width:100%;
  padding:.875rem 1.5rem;
  border:none;
  border-radius:var(--r-sm);
  font-family:'DM Sans',sans-serif;
  font-size:.9rem;
  font-weight:500;
  cursor:pointer;
  transition:all .18s ease;
  letter-spacing:.01em;
}
.btn-primary{
  background:var(--accent);
  color:#fff;
  box-shadow:0 2px 8px rgba(201,107,74,.25);
}
.btn-primary:hover:not(:disabled){
  background:var(--accent-hover);
  transform:translateY(-1px);
  box-shadow:0 4px 14px rgba(201,107,74,.32);
}
.btn-primary:active:not(:disabled){transform:translateY(0)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{
  background:var(--cream-mid);
  color:var(--text-mid);
  border:1px solid var(--border);
}
.btn-secondary:hover{background:var(--cream-dark);color:var(--text)}
.btn-ghost{
  background:transparent;
  color:var(--muted);
  border:1px solid var(--border-light);
  width:auto;
  padding:.5rem 1rem;
  font-size:.82rem;
}
.btn-ghost:hover{background:var(--surface-warm);color:var(--text-mid);border-color:var(--border)}

/* ── PROGRESS BAR ── */
.prog-wrap{
  background:var(--cream-dark);
  border-radius:999px;
  height:3px;
  overflow:hidden;
  margin-bottom:1.75rem;
}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),#E8896A);
  border-radius:999px;
  transition:width .4s cubic-bezier(.4,0,.2,1);
}

/* ── QUIZ TOP BAR ── */
.quiz-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:1.5rem;
  gap:.5rem;
  flex-wrap:wrap;
}
.badge{
  font-size:.68rem;
  font-weight:600;
  padding:.28rem .7rem;
  border-radius:999px;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.week-badge{
  background:var(--accent-light);
  color:var(--accent);
  border:1px solid rgba(201,107,74,.2);
}
.counter{
  color:var(--muted);
  font-size:.78rem;
  font-weight:400;
}
.score-badge{
  background:var(--text);
  color:#fff;
  font-variant-numeric:tabular-nums;
}

/* ── QUESTION ── */
.q-text{
  font-family:'Cormorant Garamond',serif;
  font-size:1.25rem;
  font-weight:500;
  line-height:1.7;
  margin-bottom:1.5rem;
  color:var(--text);
}
.q-text em{font-style:italic}

/* ── OPTIONS ── */
.opts{display:flex;flex-direction:column;gap:.55rem}
.opt-btn{
  display:flex;align-items:flex-start;gap:.85rem;
  padding:.85rem 1.1rem;
  border:1.5px solid var(--border-light);
  border-radius:var(--r-sm);
  background:var(--surface-warm);
  cursor:pointer;
  text-align:left;
  font-family:'DM Sans',sans-serif;
  font-size:.875rem;
  font-weight:400;
  color:var(--text-mid);
  width:100%;
  line-height:1.55;
  transition:all .15s ease;
}
.opt-btn:not([disabled]):hover{
  border-color:var(--accent);
  background:#fff;
  color:var(--text);
  box-shadow:0 2px 8px rgba(201,107,74,.1);
  transform:translateX(2px);
}
.opt-btn:not([disabled]):hover .opt-letter{
  background:var(--accent);
  color:#fff;
}
.opt-letter{
  width:26px;height:26px;
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:.68rem;
  font-weight:700;
  background:var(--cream-dark);
  color:var(--muted);
  flex-shrink:0;
  margin-top:.05rem;
  transition:all .15s;
  letter-spacing:.03em;
}
.opt-text{flex:1}

/* ── ANSWER STATES ── */
.opt-btn.correct{
  border-color:var(--ok);
  background:var(--ok-bg);
  transform:none;
}
.opt-btn.correct .opt-letter{background:var(--ok);color:#fff}
.opt-btn.correct .opt-text{color:var(--ok)}
.opt-btn.wrong{
  border-color:var(--no);
  background:var(--no-bg);
  transform:none;
}
.opt-btn.wrong .opt-letter{background:var(--no);color:#fff}
.opt-btn.wrong .opt-text{color:var(--no)}
.opt-btn.reveal{
  border-color:var(--ok);
  background:var(--ok-light);
}
.opt-btn.reveal .opt-letter{background:var(--ok);color:#fff}
.opt-btn.reveal .opt-text{color:var(--ok)}
.opt-btn[disabled]{cursor:default;transform:none !important}
.opt-btn.dim{opacity:.4}

/* ── FEEDBACK BOX ── */
.feedback-box{
  margin-top:1rem;
  padding:.7rem 1rem;
  border-radius:var(--r-sm);
  font-size:.82rem;
  font-weight:500;
  display:flex;align-items:flex-start;gap:.6rem;
  line-height:1.5;
}
.fb-icon{
  width:18px;height:18px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.65rem;
  flex-shrink:0;
  margin-top:.05rem;
}
.feedback-box.fb-ok{
  background:var(--ok-bg);
  color:var(--ok);
  border:1px solid var(--ok-border);
}
.feedback-box.fb-ok .fb-icon{background:var(--ok);color:#fff}
.feedback-box.fb-no{
  background:var(--no-bg);
  color:var(--text-mid);
  border:1px solid var(--no-border);
}
.feedback-box.fb-no .fb-icon{background:var(--no);color:#fff}

/* ── NEXT ROW ── */
.next-row{margin-top:1rem}

/* ── RESULTS ── */
.res-center{text-align:center}

.score-display{
  margin:0 auto 1.75rem;
  position:relative;
  width:fit-content;
}
.score-ring-svg{display:block;margin:0 auto}
.score-ring-track{fill:none;stroke:var(--cream-dark);stroke-width:5}
.score-ring-fill{
  fill:none;
  stroke:var(--accent);
  stroke-width:5;
  stroke-linecap:round;
  transform:rotate(-90deg);
  transform-origin:60px 60px;
  transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);
}
.score-inner{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  pointer-events:none;
}
.ring-num{
  font-family:'Cormorant Garamond',serif;
  font-size:2.4rem;
  font-weight:700;
  color:var(--text);
  line-height:1;
  display:block;
}
.ring-label{
  font-size:.72rem;
  color:var(--muted);
  margin-top:.15rem;
  display:block;
  font-weight:400;
  letter-spacing:.03em;
}

.res-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.6rem;
  font-weight:600;
  margin-bottom:.4rem;
  color:var(--text);
}
.res-sub{color:var(--muted);font-size:.86rem;margin-bottom:1.75rem;line-height:1.6}
.res-btns{display:flex;flex-direction:column;gap:.6rem}

/* ── BREAKDOWN ── */
.breakdown{margin-bottom:1.5rem;text-align:left}
.breakdown-title{
  font-size:.63rem;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:var(--muted);
  margin-bottom:.85rem;
}
.bk-rows{display:flex;flex-direction:column;gap:.45rem}
.bk-row{display:flex;align-items:center;gap:.75rem;font-size:.8rem}
.bk-week{font-weight:500;min-width:56px;color:var(--text-mid)}
.bk-bar-wrap{
  flex:1;
  background:var(--cream-dark);
  border-radius:999px;
  height:5px;
  overflow:hidden;
}
.bk-bar{
  height:100%;
  background:linear-gradient(90deg,var(--accent),#E8896A);
  border-radius:999px;
  transition:width .6s cubic-bezier(.4,0,.2,1);
}
.bk-score{font-weight:500;color:var(--muted);min-width:32px;text-align:right;font-variant-numeric:tabular-nums}

/* ── DIVIDER LINE ── */
.card-divider{
  height:1px;
  background:var(--border-light);
  margin:.4rem -1.75rem 1.2rem;
}

/* ── START MSG ── */
#noWeekMsg{
  text-align:center;
  color:var(--no);
  font-size:.8rem;
  margin-top:.75rem;
  font-weight:500;
}

/* ── UTILITY ── */
.hidden{display:none!important}

/* ── RESPONSIVE ── */
@media(max-width:520px){
  .weeks-grid{grid-template-columns:repeat(3,1fr)}
  .logo h1{font-size:2rem}
  .q-text{font-size:1.1rem}
  body{padding:2rem 1rem 4rem}
}
@media(max-width:360px){
  .weeks-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="wrap">

<!-- ════ SETUP ════ -->
<div id="setup">
  <div class="logo">
    <span class="logo-eyebrow">Academic Quiz</span>
    <h1>Contextualizing Gender</h1>
    <p class="logo-sub">12 Weeks<span></span>120 Questions<span></span>MCQ Format</p>
    <div class="logo-rule"></div>
  </div>

  <div class="card">
    <div class="section-label">Select Weeks</div>
    <div class="select-all-row">
      <input type="checkbox" id="selAll" checked>
      <label for="selAll">Select all twelve weeks</label>
    </div>
    <div class="weeks-grid" id="weeksGrid"></div>
  </div>

  <div class="card">
    <div class="options-row">
      <div>
        <div class="opt-label">Shuffle Questions</div>
        <div class="opt-sub">Randomise order each session</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="shuffleTog" checked>
        <span class="tslider"></span>
      </label>
    </div>
  </div>

  <button class="btn btn-primary" id="startBtn">Begin Quiz</button>
  <p id="noWeekMsg" class="hidden">Please select at least one week to continue.</p>
</div>

<!-- ════ QUIZ ════ -->
<div id="quiz" class="hidden">
  <div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>
  <div class="quiz-top">
    <span class="badge week-badge" id="weekBadge">Week 1</span>
    <span class="counter" id="qCounter">Question 1 of 10</span>
    <span class="badge score-badge" id="scoreBadge">0 / 0</span>
  </div>
  <div class="card" id="qCard">
    <div class="q-text" id="qText"></div>
    <div class="opts" id="opts"></div>
    <div id="feedback" class="hidden"></div>
  </div>
  <div class="next-row hidden" id="nextRow">
    <button class="btn btn-primary" id="nextBtn">Next Question →</button>
  </div>
</div>

<!-- ════ RESULTS ════ -->
<div id="results" class="hidden">
  <div class="logo">
    <span class="logo-eyebrow">Quiz Complete</span>
    <h1>Contextualizing Gender</h1>
    <div class="logo-rule"></div>
  </div>
  <div class="card res-center">
    <div class="score-display">
      <svg class="score-ring-svg" width="120" height="120" viewBox="0 0 120 120">
        <circle class="score-ring-track" cx="60" cy="60" r="52"/>
        <circle class="score-ring-fill" id="ringCircle" cx="60" cy="60" r="52"
          stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
      </svg>
      <div class="score-inner">
        <span class="ring-num" id="ringNum">0</span>
        <span class="ring-label" id="ringLabel">out of 0</span>
      </div>
    </div>
    <div class="res-title" id="resTitle">Great work!</div>
    <div class="res-sub" id="resSub">You answered all questions.</div>
    <div class="breakdown" id="breakdown"></div>
    <div class="res-btns">
      <button class="btn btn-primary" id="retryBtn">Retry Same Weeks</button>
      <button class="btn btn-secondary" id="homeBtn">Change Weeks</button>
    </div>
  </div>
</div>

</div><!-- /wrap -->
<script>
// ═══════════════════════════════════════════════
//  QUESTION DATA  (week, question, options, correct-index 0-based)
// ═══════════════════════════════════════════════
const DATA = {
1:[
  {q:"The <em>Second Sex</em> was first published in:",o:["1945","1947","1949","1953"],a:2},
  {q:"Which critic coined the term <em>Écriture féminine</em> or \"women's writing\"?",o:["Luce Irigaray","Julia Kristeva","Hélène Cixous","Nancy Chodorow"],a:2},
  {q:"What is the name of the volume in <em>The Second Sex</em> (1949) which opens with a simple definition: Woman is \"a womb, an ovary\"?",o:["Destiny","Situation","History","Myth"],a:0},
  {q:"Who is recognized as the first female professional writer of the Middle Ages and an author at the court of King Charles VI of France, known for <em>The Book of the City of Ladies</em>?",o:["Jane Anger","Mary Wollstonecraft","Virginia Woolf","Christine de Pizan"],a:3},
  {q:"The epigraph of Simone de Beauvoir's <em>She Came to Stay</em> that says \"each consciousness pursues the death of the other\" is taken from:",o:["Nietzsche's <em>Thus Spoke Zarathustra</em>","Hegel's <em>Phenomenology of Spirit</em>","Sartre's <em>Being and Nothingness</em>","Kierkegaard's <em>Either/Or</em>"],a:1},
  {q:"Simone de Beauvoir's novel <em>She Came to Stay</em> was published in:",o:["1937","1943","1949","1951"],a:1},
  {q:"The film <em>And God Created Woman</em> was directed by:",o:["François Truffaut","Jean-Luc Godard","Roger Vadim","Claude Chabrol"],a:2},
  {q:"Rosabeth Kanter's <em>Men and Women of the Corporation</em> (1977) explored:",o:["Gender bias in literature","Workplace structures and gender inequality in the US","Cultural construction of sexuality in Europe","Domestic division of labor in Spain"],a:1},
  {q:"The <em>Cyborg Manifesto</em> (1985) was written by:",o:["Rosi Braidotti","Donna Haraway","Anne Balsamo","Teresa de Lauretis"],a:1},
  {q:"Who wrote the essay <em>Silly Novels by Lady Novelists</em>?",o:["Mary Wollstonecraft","George Eliot","Virginia Woolf","Harriet Taylor"],a:1}
],

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let queue = [];
let idx = 0;
let score = 0;
let weekScores = {};
let selectedWeeks = [];
let shuffleOn = true;

// ═══════════════════════════════════════════════
//  SETUP
// ═══════════════════════════════════════════════
const weeksGrid = document.getElementById('weeksGrid');
const selAll    = document.getElementById('selAll');

for(let w=1;w<=12;w++){
  const label = document.createElement('label');
  label.className = 'week-item';
  label.innerHTML = `<input type="checkbox" value="${w}" checked><span>Week ${w}</span>`;
  weeksGrid.appendChild(label);
}

const weekBoxes = () => [...document.querySelectorAll('#weeksGrid input[type=checkbox]')];

selAll.addEventListener('change', ()=>{
  weekBoxes().forEach(cb => cb.checked = selAll.checked);
});

weeksGrid.addEventListener('change', ()=>{
  const all = weekBoxes();
  const checked = all.filter(c=>c.checked);
  selAll.indeterminate = checked.length > 0 && checked.length < all.length;
  selAll.checked = checked.length === all.length;
});

document.getElementById('shuffleTog').addEventListener('change', e => { shuffleOn = e.target.checked; });

document.getElementById('startBtn').addEventListener('click', ()=>{
  selectedWeeks = weekBoxes().filter(c=>c.checked).map(c=>+c.value);
  if(!selectedWeeks.length){
    document.getElementById('noWeekMsg').classList.remove('hidden');
    return;
  }
  document.getElementById('noWeekMsg').classList.add('hidden');
  startQuiz();
});

// ═══════════════════════════════════════════════
//  QUIZ LOGIC
// ═══════════════════════════════════════════════
function buildQueue(){
  queue = [];
  selectedWeeks.forEach(w => {
    DATA[w].forEach((qObj,i) => queue.push({...qObj, week:w, qNum:i+1}));
  });
  if(shuffleOn) shuffle(queue);
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function startQuiz(){
  buildQueue();
  idx = 0;
  score = 0;
  weekScores = {};
  selectedWeeks.forEach(w => weekScores[w]={correct:0,total:0});
  show('quiz');
  renderQuestion();
}

function renderQuestion(){
  const q = queue[idx];

  // progress
  const pct = (idx / queue.length) * 100;
  document.getElementById('progFill').style.width = pct + '%';

  // meta
  document.getElementById('weekBadge').textContent = `Week ${q.week}`;
  document.getElementById('qCounter').textContent = `Question ${idx+1} of ${queue.length}`;
  document.getElementById('scoreBadge').textContent = `${score} / ${idx}`;

  // question
  document.getElementById('qText').innerHTML = q.q;

  // options
  const optsEl = document.getElementById('opts');
  optsEl.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span class="opt-text">${opt}</span>`;
    btn.addEventListener('click', () => handleAnswer(i, q));
    optsEl.appendChild(btn);
  });

  // hide feedback & next
  const fb = document.getElementById('feedback');
  fb.className = 'hidden';
  fb.innerHTML = '';
  document.getElementById('nextRow').classList.add('hidden');
}

function handleAnswer(chosen, q){
  const buttons = document.querySelectorAll('.opt-btn');
  buttons.forEach(b => b.disabled = true);

  const correct = q.a;
  weekScores[q.week].total++;

  if(chosen === correct){
    buttons[chosen].classList.add('correct');
    score++;
    weekScores[q.week].correct++;
    showFeedback(true, null);
  } else {
    buttons[chosen].classList.add('wrong');
    buttons[correct].classList.add('reveal');
    buttons.forEach((b,i)=>{ if(i!==chosen && i!==correct) b.classList.add('dim'); });
    const letters = ['A','B','C','D'];
    showFeedback(false, `Correct answer: <strong>${letters[correct]}. ${q.o[correct]}</strong>`);
  }

  document.getElementById('scoreBadge').textContent = `${score} / ${idx+1}`;
  document.getElementById('nextRow').classList.remove('hidden');
  const pct = ((idx+1) / queue.length) * 100;
  document.getElementById('progFill').style.width = pct + '%';
}

function showFeedback(ok, correctHtml){
  const fb = document.getElementById('feedback');
  fb.className = ok ? 'feedback-box fb-ok' : 'feedback-box fb-no';
  fb.innerHTML = ok
    ? `<span class="fb-icon">✓</span><span>Correct!</span>`
    : `<span class="fb-icon">✗</span><span>${correctHtml}</span>`;
}

document.getElementById('nextBtn').addEventListener('click', ()=>{
  idx++;
  if(idx >= queue.length){
    showResults();
  } else {
    renderQuestion();
  }
});

// ═══════════════════════════════════════════════
//  RESULTS
// ═══════════════════════════════════════════════
function showResults(){
  show('results');
  const total = queue.length;
  const pct = Math.round((score/total)*100);

  document.getElementById('ringNum').textContent = score;
  document.getElementById('ringLabel').textContent = `out of ${total}`;

  // Animate ring
  const circumference = 2 * Math.PI * 52; // r=52 → ~326.7
  const offset = circumference - (pct / 100) * circumference;
  setTimeout(()=>{
    document.getElementById('ringCircle').style.strokeDashoffset = offset;
  }, 100);

  let title, sub;
  if(pct===100)      { title='Perfect Score'; sub='Flawless — an outstanding result.'; }
  else if(pct>=80)   { title='Excellent Work'; sub=`You scored ${pct}% — well above average.`; }
  else if(pct>=60)   { title='Good Effort'; sub=`You scored ${pct}% — keep reviewing the material.`; }
  else if(pct>=40)   { title='Keep Practising'; sub=`You scored ${pct}% — revisit the weaker areas.`; }
  else               { title='Needs More Review'; sub=`You scored ${pct}% — go through the notes again.`; }

  document.getElementById('resTitle').textContent = title;
  document.getElementById('resSub').textContent   = sub;

  // breakdown by week
  const bk = document.getElementById('breakdown');
  const weeksUsed = selectedWeeks.filter(w => weekScores[w] && weekScores[w].total > 0);
  if(weeksUsed.length > 1){
    bk.innerHTML = `<div class="breakdown-title">Score by Week</div><div class="bk-rows" id="bkRows"></div>`;
    const rows = document.getElementById('bkRows');
    weeksUsed.forEach(w => {
      const {correct, total} = weekScores[w];
      const p = total ? Math.round((correct/total)*100) : 0;
      rows.innerHTML += `
        <div class="bk-row">
          <span class="bk-week">Week ${w}</span>
          <div class="bk-bar-wrap"><div class="bk-bar" style="width:${p}%"></div></div>
          <span class="bk-score">${correct}/${total}</span>
        </div>`;
    });
  } else {
    bk.innerHTML = '';
  }
}

document.getElementById('retryBtn').addEventListener('click', ()=>{ startQuiz(); });
document.getElementById('homeBtn').addEventListener('click', ()=>{ show('setup'); });

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function show(id){
  ['setup','quiz','results'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}
</script>
